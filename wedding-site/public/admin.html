<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Kevin &amp; Ady Wedding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="admin-body">

<!-- ═══════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════ -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <p class="login-couple">Kevin &amp; Ady</p>
      <p class="login-subtitle">Admin Panel</p>
    </div>
    <form class="login-form" id="loginForm" novalidate>
      <div class="form-group">
        <label for="loginPassword">Mật khẩu</label>
        <input type="password" id="loginPassword" placeholder="Nhập mật khẩu..." autocomplete="current-password" required />
      </div>
      <p class="login-error" id="loginError" hidden></p>
      <button type="submit" class="btn-primary" id="loginBtn">Đăng nhập</button>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     ADMIN LAYOUT (shown after login)
═══════════════════════════════════════════ -->
<div class="admin-layout" id="adminLayout" hidden>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Admin sidebar">
    <div class="sidebar-header">
      <p class="sidebar-couple">Kevin &amp; Ady</p>
      <p class="sidebar-sub">Admin Panel</p>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-group-label">NỘI DUNG</p>
      <ul role="list">
        <li><button class="nav-item active" data-section="general">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          Thông tin chung
        </button></li>
        <li><button class="nav-item" data-section="hero">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Hero
        </button></li>
        <li><button class="nav-item" data-section="story">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Love Story
        </button></li>
        <li><button class="nav-item" data-section="couple">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Couple
        </button></li>
        <li><button class="nav-item" data-section="location">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
          Location
        </button></li>
        <li><button class="nav-item" data-section="schedule">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Schedule
        </button></li>
        <li><button class="nav-item" data-section="gallery">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Gallery
        </button></li>
        <li><button class="nav-item" data-section="details">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Details
        </button></li>
        <li><button class="nav-item" data-section="saigonGuide">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
          Saigon Guide
        </button></li>
      </ul>

      <p class="nav-group-label">TƯƠNG TÁC</p>
      <ul role="list">
        <li><button class="nav-item" data-section="rsvp">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Danh sách RSVP
        </button></li>
      </ul>

      <p class="nav-group-label">TÀI KHOẢN</p>
      <ul role="list">
        <li><button class="nav-item" data-section="password">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Đổi mật khẩu
        </button></li>
        <li><button class="nav-item danger" id="logoutBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Đăng xuất
        </button></li>
      </ul>
    </nav>
  </aside>

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main content -->
  <div class="admin-main" id="adminMain">
    <!-- Top bar -->
    <header class="admin-topbar">
      <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <nav class="breadcrumb" aria-label="Breadcrumb" id="breadcrumb">
        Admin / <span id="breadcrumbSection">Thông tin chung</span>
      </nav>
      <div class="topbar-right">
        <button class="btn-save-top" id="saveTopBtn">💾 Lưu thay đổi</button>
      </div>
    </header>

    <!-- Panel container -->
    <main class="panel-wrap" id="panelWrap">
      <!-- Rendered by admin.js -->
    </main>

    <!-- Sticky save bar -->
    <div class="save-bar" id="saveBar">
      <button class="btn-primary save-btn" id="saveBarBtn">💾 Lưu thay đổi</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

<!-- Confirm modal -->
<div class="confirm-modal" id="confirmModal" hidden role="dialog" aria-modal="true">
  <div class="confirm-box">
    <p class="confirm-msg" id="confirmMsg">Bạn chắc chắn muốn xóa?</p>
    <div class="confirm-actions">
      <button class="btn-secondary" id="confirmCancel">Hủy</button>
      <button class="btn-danger" id="confirmOk">Xóa</button>
    </div>
  </div>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
